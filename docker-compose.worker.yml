services:
  video-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        PYTORCH_IMAGE: ${PYTORCH_IMAGE:-pytorch/pytorch:2.4.1-cuda12.1-cudnn9-runtime}
        APT_MIRROR: ${APT_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
        TORCH_INSTALL_INDEX_URL: ${TORCH_INSTALL_INDEX_URL:-}
        TORCH_INSTALL_EXTRA_INDEX_URL: ${TORCH_INSTALL_EXTRA_INDEX_URL:-}
        TORCH_INSTALL_PACKAGE: ${TORCH_INSTALL_PACKAGE:-}
        TRANSFORMERS_INSTALL_PACKAGE: ${TRANSFORMERS_INSTALL_PACKAGE:-transformers>=4.57}
        PREFETCH_FAST_MODEL: ${PREFETCH_FAST_MODEL:-false}
        VIDEO_FAST_MODEL_ID: ${VIDEO_FAST_MODEL_ID:-openai/clip-vit-base-patch32}
    container_name: video-worker
    restart: unless-stopped
    runtime: nvidia
    shm_size: "2gb"
    env_file:
      - path: .env.worker.local
        required: false
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command: ["python", "worker.py"]
    volumes:
      - video_worker_tmp:/tmp/video-jobs
      - video_worker_hf_cache:/models/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; assert os.path.exists('/app/worker.py')\""]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  video_worker_tmp:
  video_worker_hf_cache:
