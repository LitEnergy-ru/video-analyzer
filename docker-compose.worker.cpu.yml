services:
  video-worker:
    runtime: runc
    build:
      args:
        PYTORCH_IMAGE: ${PYTORCH_IMAGE:-python:3.12-slim}
        TORCH_INSTALL_INDEX_URL: ${TORCH_INSTALL_INDEX_URL:-}
        TORCH_INSTALL_EXTRA_INDEX_URL: ${TORCH_INSTALL_EXTRA_INDEX_URL:-}
        TORCH_INSTALL_PACKAGE: ${TORCH_INSTALL_PACKAGE:-}
        TRANSFORMERS_INSTALL_PACKAGE: ${TRANSFORMERS_INSTALL_PACKAGE:-transformers>=4.57}
        PREFETCH_FAST_MODEL: ${PREFETCH_FAST_MODEL:-false}
        VIDEO_FAST_MODEL_ID: ${VIDEO_FAST_MODEL_ID:-openai/clip-vit-base-patch32}
    environment:
      NVIDIA_VISIBLE_DEVICES: ""
      NVIDIA_DRIVER_CAPABILITIES: ""
